<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="buttonstyle.css">
    <title>Shuffle Names</title>
    
     

  </head>
  <body>
    
      
    <header>
      <h1 class="foreground">Shuffle Names</h1>
    </header>
    

    <main>
       <canvas id="canvas"></canvas>
       <script src="background.js"></script>
       

    <div class="foreground">
        <h2>Wingardium Deviosa </h2>
    <p>Klicke auf den Button "PUSH ME", um eine zufällige Person auszuwählen:</p>
    <p>Klicke auf den Button "Reload", um die Seite neu zu laden</p>
    <button id="reload-btn" type="button">Reload</button>

    <script>
      const reloadBtn = document.getElementById("reload-btn");
      reloadBtn.addEventListener("click", function() {
        location.reload();
      });
    </script>
    <button onclick="wählePerson()">PUSH ME</button>
    <p>Die ausgewählte Person ist:</p>
    <p id="ausgewähltePerson">???</p>
    
    <script>
      function wählePerson() {
        var personen = ["Alper", "Albert", "Frank", "Fredy","Hanna","Ihor","Kai","Kim", "Kristin", "Manuel"," Michelle", "Halid", "Ömer", "Sebastian", "Valeri", "Yahya", "Zizi", "Baris", "David", "Andreea"];
        var index = Math.floor(Math.random() * personen.length);
        var ausgewähltePerson = personen[index];
        document.getElementById("ausgewähltePerson").textContent = ausgewähltePerson;
      }
    </script>
    
    </div>
    
  </main>
  </body>
</html>
